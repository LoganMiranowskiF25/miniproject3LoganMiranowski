{% extends "base.html" %}

{%block content%}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Form Page</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Enter title" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">Content</label>
                <textarea class="form-control" id="content" name="content" rows="5" placeholder="Enter content" required></textarea>
            </div>
            <button type="submit" class="btn btn-warning w-100">Submit</button>
        </form>

        <div class="mt-3 text-center">
            <a href="/">Back to Home</a>
            <a href="/dashboard" class="ms-3">Go to Dashboard</a>
        </div>

        <button class="btn btn-secondary mt-3" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Open Modal
        </button>
    </div>
</div>
{%endblock%}
